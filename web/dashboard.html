        // WebRTC连接相关变量
        let pc = null;
        let isPreloadMode = false;
        let isReconnecting = false;

        // 语音识别相关变量
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        let interimTranscript = '';

        // 开始播放 - 只有点击开始连接时才真正建立连接
        function startPlay() {
            // 如果已经有连接，先停止
            if (pc && pc.connectionState !== 'closed') {
                console.log('停止当前连接，开始新连接');
                stopPlay();
                // 等待一小段时间让连接完全关闭
                setTimeout(() => {
                    startPlay();
                }, 500);
                return;
            }

            // 获取当前选中的数字人形象 - 修正ID获取方式
            const selectedItem = document.querySelector('.avatar-item.selected');
            let selectedAvatar = (window.__selectedAvatarId || '').toString();

            if (!selectedAvatar && selectedItem) {
                // 从数据属性中获取真实的ID
                selectedAvatar = selectedItem.dataset.avatarId || 'wav2lip256_avatar1';
            }
            if (!selectedAvatar) selectedAvatar = 'wav2lip256_avatar1';

            console.log('开始连接，使用顾问:', selectedAvatar);

            // 创建PeerConnection
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            // 添加音视频轨道
            pc.addTransceiver("audio", { direction: "recvonly" });
            pc.addTransceiver("video", { direction: "recvonly" });

            // 设置视频流
            pc.ontrack = function(event) {
                console.log('收到轨道:', event.track.kind);
                if (event.track.kind === 'video') {
                    const video = document.getElementById('video');
                    video.srcObject = event.streams[0];

                    // 隐藏覆盖层
                    document.querySelector('.video-overlay').style.display = 'none';
                }
            };

            // 创建offer并发送
            pc.createOffer().then(offer => {
                return pc.setLocalDescription(offer);
            }).then(() => {
                console.log('发送offer到后端...');

                return fetch('/offer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sdp: pc.localDescription.sdp,
                        type: pc.localDescription.type,
                        avatar_id: selectedAvatar
                    })
                });
            }).then(response => response.json())
            .then(data => {
                console.log('收到后端响应:', data);

                // 保存会话ID
                if (data.sessionid) {
                    document.getElementById('sessionid').value = data.sessionid;
                    console.log('会话ID设置为:', data.sessionid);
                    applySavedIdentityToSession(data.sessionid);
                    applyTtsSpeed();
                    maybePushTtsVoiceToSession(true);
                }

                // 设置远程描述
                return pc.setRemoteDescription(new RTCSessionDescription({
                    type: 'answer',
                    sdp: data.sdp
                }));
            }).then(() => {
                console.log('WebRTC连接已建立');
                updateConnectionStatus('connected');
            }).catch(error => {
                console.error('WebRTC连接失败:', error);
                updateConnectionStatus('disconnected');
                addChatMessage('连接失败: ' + error.message, 'system');
            });
        }

        // 停止播放
        function stopPlay() {
            if (pc) {
                // 关闭所有轨道
                if (pc.getReceivers) {
                    pc.getReceivers().forEach(receiver => {
                        if (receiver.track) {
                            receiver.track.stop();
                        }
                    });
                }

                // 关闭连接
                pc.close();
                pc = null;
                console.log('WebRTC连接已关闭');
            }

            // 重置UI状态
            const overlay = document.querySelector('.video-overlay');
            if (overlay) {
                overlay.style.display = 'flex';
            }
            updateConnectionStatus('disconnected');

            // 清除视频元素
            const videoElement = document.getElementById('video');
            if (videoElement) {
                videoElement.srcObject = null;
            }
        }

        // 语音输入功能
        function startVoiceInput() {
            if (isRecording) {
                stopVoiceInput();
                return;
            }

            // 检查浏览器是否支持语音识别
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('您的浏览器不支持语音识别功能，请使用Chrome、Edge等现代浏览器');
                return;
            }

            // 初始化语音识别
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';

            // 重置转录文本
            finalTranscript = '';
            interimTranscript = '';

            // 开始识别时的处理
            recognition.onstart = function() {
                console.log('语音识别开始');
                isRecording = true;
                updateVoiceUI(true);
            };

            // 识别结果处理
            recognition.onresult = function(event) {
                interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // 更新输入框显示
                const messageInput = document.getElementById('chat-message');
                messageInput.value = finalTranscript + interimTranscript;

                // 自动滚动到输入框底部
                messageInput.scrollTop = messageInput.scrollHeight;
            };

            // 识别结束处理
            recognition.onend = function() {
                console.log('语音识别结束');
                isRecording = false;
                updateVoiceUI(false);

                // 如果有最终转录文本，自动发送
                if (finalTranscript.trim()) {
                    setTimeout(() => {
                        sendChatMessage();
                    }, 500);
                }
            };

            // 错误处理
            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                isRecording = false;
                updateVoiceUI(false);

                let errorMsg = '语音识别错误: ';
                switch(event.error) {
                    case 'not-allowed':
                        errorMsg += '请允许浏览器访问麦克风权限';
                        break;
                    case 'audio-capture':
                        errorMsg += '无法访问麦克风';
                        break;
                    case 'network':
                        errorMsg += '网络连接错误';
                        break;
                    default:
                        errorMsg += event.error;
                }

                addChatMessage(errorMsg, 'system');
            };

            // 开始语音识别
            try {
                recognition.start();
            } catch (error) {
                console.error('启动语音识别失败:', error);
                addChatMessage('启动语音识别失败，请刷新页面重试', 'system');
            }
        }

        // 停止语音输入
        function stopVoiceInput() {
            if (recognition && isRecording) {
                recognition.stop();
                isRecording = false;
                updateVoiceUI(false);
            }
        }

        // 更新语音输入UI状态
        function updateVoiceUI(recording) {
            const voiceBtn = document.getElementById('voice-input');
            const voiceStatus = document.getElementById('voice-status');

            if (recording) {
                voiceBtn.classList.add('recording');
                voiceBtn.innerHTML = '<i class="bi bi-mic-fill"></i>';
                voiceBtn.title = '停止语音输入';
                voiceStatus.style.display = 'flex';
            } else {
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '<i class="bi bi-mic"></i>';
                voiceBtn.title = '语音输入';
                voiceStatus.style.display = 'none';
            }
        }

        // 检查语音识别支持
        function checkSpeechRecognitionSupport() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                // 如果不支持语音识别，隐藏语音输入按钮
                document.getElementById('voice-input').style.display = 'none';
                console.log('浏览器不支持语音识别API');
            } else {
                console.log('浏览器支持语音识别API');
            }
        }

        // 保存身份预设
        function saveIdentity() {
            const identityText = document.getElementById('identity-preset').value.trim();
            const sessionId = parseInt(document.getElementById('sessionid').value);
            const avatarId = getSelectedAvatarId();

            if (!identityText) {
                alert('请输入数字人的身份信息');
                return;
            }

            console.log('保存身份预设:', identityText);

            const token = localStorage.getItem('adminToken') || '';
            const headers = {
                'Content-Type': 'application/json'
            };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            fetch('/set_avatar_identity', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                    avatar_id: avatarId,
                    identity: identityText,
                    sessionid: sessionId
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    addChatMessage('身份预设已保存，数字人将根据此身份回答问题', 'system');

                    // 显示成功提示
                    showNotification('身份预设保存成功', 'success');
                } else {
                    addChatMessage('身份预设保存失败: ' + data.msg, 'system');
                }
            })
            .catch(error => {
                console.error('保存身份预设错误:', error);
                addChatMessage('保存身份预设时发生错误', 'system');
            });
        }

        // 清空身份预设
        function clearIdentity() {
            document.getElementById('identity-preset').value = '';
            const avatarId = getSelectedAvatarId();

            const sessionId = parseInt(document.getElementById('sessionid').value);

            const token = localStorage.getItem('adminToken') || '';
            const headers = {
                'Content-Type': 'application/json'
            };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            fetch('/clear_avatar_identity', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                    avatar_id: avatarId,
                    sessionid: sessionId
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    addChatMessage('身份预设已清空，数字人将使用默认身份', 'system');

                    // 显示成功提示
                    showNotification('身份预设已清空', 'info');
                }
            })
            .catch(error => {
                console.error('清空身份预设错误:', error);
            });
        }

        // 显示通知
        function showNotification(message, type = 'info') {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <div class="notification-content">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;

            // 添加到页面
            document.body.appendChild(notification);

            // 显示动画
            setTimeout(() => {
                notification.classList.add('show');
            }, 10);

            // 3秒后自动移除
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }

        function getSelectedAvatarId() {
            const selectedItem = document.querySelector('.avatar-item.selected');
            return (selectedItem && selectedItem.dataset && selectedItem.dataset.avatarId)
                ? selectedItem.dataset.avatarId
                : 'wav2lip256_avatar1';
        }

        // 加载保存的身份预设（当前选中头像）
        function loadSavedIdentity() {
            const avatarId = getSelectedAvatarId();
            loadSavedIdentityForAvatar(avatarId);
        }

        function loadSavedIdentityForAvatar(avatarId) {
            fetch(`/get_avatar_identity?avatar_id=${encodeURIComponent(avatarId)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0 && data.data) {
                        const savedIdentity = (data.data.identity || '');
                        document.getElementById('identity-preset').value = savedIdentity;
                        console.log('已加载头像身份预设:', avatarId);
                    } else {
                        document.getElementById('identity-preset').value = '';
                    }
                })
                .catch(err => {
                    console.warn('加载头像身份预设失败:', err);
                    document.getElementById('identity-preset').value = '';
                });
        }

        // 重建连接（切换形象）后，把本地保存的身份同步到后端会话
        function applySavedIdentityToSession(sessionId) {
            const avatarId = getSelectedAvatarId();
            fetch(`/get_avatar_identity?avatar_id=${encodeURIComponent(avatarId)}`)
                .then(r => r.json())
                .then(data => {
                    const identityText = data && data.data ? (data.data.identity || '') : '';
                    if (!identityText.trim()) return;
                    return fetch('/set_identity', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            identity: identityText,
                            sessionid: parseInt(sessionId)
                        })
                    });
                })
                .then(r => r ? r.json() : null)
                .then(data => {
                    if (data && data.code === 0) {
                        console.log('身份已同步到新会话:', sessionId);
                    }
                })
                .catch(err => {
                    console.warn('同步身份到新会话失败:', err);
                });
        }
    </script>
