<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/admin_common.js"></script>
    <title>帮助中心</title>
    <link rel="stylesheet" href="/admin_common.css" />
  </head>
  <body>
    <div class="admin-content" style="max-width: 1000px; margin: 0 auto;">
      <div class="panel">
        <h2 style="margin-top:0;">帮助中心</h2>
        <p class="muted">留学咨询智能数字人平台使用说明</p>
        <hr />
        <h4>1. 如何开始对话</h4>
        <p>进入主页后先点击“开始连接”，连接成功后在右侧输入问题或点击快捷提问。</p>
        <h4>2. 常见问题</h4>
        <p>如果无声音：检查浏览器音量、系统音频输出、TTS 引擎配置。</p>
        <p>如果连接失败：检查网络、WebRTC 端口与后端日志。</p>
        <h4>3. 功能说明</h4>
        <p>支持身份预设、语音输入、快捷问题、字幕开关、语速调节、历史会话查看。</p>
        <div style="margin-top:16px;">
          <button class="btn" onclick="window.location.href='/dashboard.html'">返回主页</button>
        </div>
      </div>
    </div>
  <script src="/i18n3.js"></script>
</body>
